              petal.vx += (-dy / distance * swirl + gust.driftX * (0.46 + influence * 0.32)) * influence * dt;
              petal.vy += (dx / distance * swirl * 0.72 - gust.upLift * (0.45 + coreLift)) * influence * dt;
              petal.angle += gust.spin * influence * (2.4 + coreLift * 2.2) * dt;
              petal.spin += gust.spin * influence * 0.18 * dt;
              gustInfluence += influence * 1.28;
            }
          }

          gustInfluence += applyPointerForce(petal, dt);

          petal.vy = Math.max(petal.vy, -32);

          const bob = Math.cos(time * petal.floatSpeed + petal.phase) * petal.floatAmp;
          petal.x += (petal.vx + bob * 0.6) * dt;
          petal.y += (petal.vy + bob) * dt;
          petal.angle += (petal.spin + ambient * 0.01) * dt * (0.75 + gustInfluence * 0.7);

          const outsideX = petal.x < -120 || petal.x > width + 120;
          const outsideTop = petal.y < -80;
          const shouldCheckGroundLayer = quality.layerGroundChecks && petal.y > height * 0.5;
          const nearGroundLayer = shouldCheckGroundLayer && petal.y > groundYAt(clamp(petal.x, 0, width)) - height * 0.2;
          if (petal.groundDepth >= GROUND_FOREGROUND_DEPTH || nearGroundLayer) {
            setPetalLayer(petal, 1);
          }
          let shouldReset = outsideX || outsideTop;
          let landed = false;

          if (!outsideTop && (petal.y > groundCheckY || outsideX)) {
            const boundedX = clamp(petal.x, 0, width);
            const depth = petal.groundDepth ?? chooseGroundPetalDepth();
            const groundY = groundPetalYAt(boundedX, depth);
            const landSlack = lerp(6, 12, depth);
            const readyToSettle = petal.y > groundY - landSlack && petal.vy > -10;
            landed = readyToSettle || petal.y > groundY - 1;
            shouldReset = shouldReset || readyToSettle || petal.y > groundY + landSlack;
          }

          if (shouldReset) {
            if (landed && Math.random() < 0.72) {
              storeGroundPetal(petal);
            }
            resetPetal(petal, false);
          }
        }
      }

      function drawPetalLayer(layer, time) {
        const depthScale = layer === 0 ? 0.92 : 1.04;
        const depthAlpha = layer === 0 ? 0.72 : 1;
        const layerPetals = petalLayers[layer];

        for (let i = 0; i < layerPetals.length; i += 1) {
          const petal = layerPetals[i];
          if (
            petal.x < -quality.drawMargin ||
            petal.x > width + quality.drawMargin ||
            petal.y < -quality.drawMargin ||
            petal.y > height + quality.drawMargin
          ) {
            continue;
          }

          const flutter = 1 + Math.sin(time * petal.flutter + petal.phase) * 0.1;
          const scaleX = petal.size * petal.aspect * flutter * depthScale;
          const scaleY = petal.size * (1.02 - flutter * 0.08) * depthScale;
          const cosine = Math.cos(petal.angle);
          const sine = Math.sin(petal.angle);

          ctx.globalAlpha = petal.alpha * depthAlpha;
          ctx.setTransform(
            cosine * scaleX * dpr,
            sine * scaleX * dpr,
            -sine * scaleY * dpr,
            cosine * scaleY * dpr,
            petal.x * dpr,
            petal.y * dpr
          );
          ctx.drawImage(petalSprites[petal.sprite], -32, -32);
        }

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.globalAlpha = 1;
      }

      function clearGroundLayer(targetCtx, targetCanvas) {
        targetCtx.setTransform(1, 0, 0, 1, 0, 0);
        targetCtx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);
        targetCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function drawCachedGroundPetal(targetCtx, petal) {
        const angle = petal.angle;
        const scaleX = petal.size * petal.aspect;
        const scaleY = petal.size * 0.98;
        const cosine = Math.cos(angle);
        const sine = Math.sin(angle);

        targetCtx.globalAlpha = petal.alpha;
        targetCtx.setTransform(
          cosine * scaleX * dpr,
          sine * scaleX * dpr,
          -sine * scaleY * dpr,
          cosine * scaleY * dpr,
          petal.x * dpr,
          petal.y * dpr
        );
        targetCtx.drawImage(petalSprites[petal.sprite], -32, -32);
      }

      function rebuildGroundPetalLayer(time) {
        clearGroundLayer(farGroundCtx, farGroundCanvas);
        clearGroundLayer(groundCtx, groundCanvas);

        for (let i = 0; i < groundPetals.length; i += 1) {
          const petal = groundPetals[i];
          if (
            petal.x < -quality.drawMargin ||
            petal.x > width + quality.drawMargin ||
            petal.y < -quality.drawMargin ||
            petal.y > height + quality.drawMargin
          ) {
            continue;
          }

          const activeCtx = petal.depth < GROUND_FOREGROUND_DEPTH ? farGroundCtx : groundCtx;
          drawCachedGroundPetal(activeCtx, petal);
        }

        farGroundCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        farGroundCtx.globalAlpha = 1;
        groundCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        groundCtx.globalAlpha = 1;
        groundCacheDirty = false;
        groundCacheReady = true;
        nextGroundCacheRefresh = time + Math.max(GROUND_CACHE_REFRESH_INTERVAL, quality.groundCacheRefresh);
      }

      function drawGroundPetals(time) {
        if (groundCacheDirty && (!groundCacheReady || time >= nextGroundCacheRefresh)) {
          rebuildGroundPetalLayer(time);
        }

        ctx.drawImage(groundCanvas, 0, 0, width, height);
      }

      function drawFarGroundPetals(time) {
        if (groundCacheDirty && (!groundCacheReady || time >= nextGroundCacheRefresh)) {
          rebuildGroundPetalLayer(time);
        }

        ctx.drawImage(farGroundCanvas, 0, 0, width, height);
      }

      function sceneMotion(time) {
        const idleX = Math.sin(time * 0.12) * 0.34 + Math.sin(time * 0.037 + 1.8) * 0.18;
        const idleY = Math.cos(time * 0.09 + 0.8) * 0.18;
        const driftX = clamp(idleX, -0.38, 0.38);
        const driftY = clamp(idleY, -0.22, 0.22);

        return {
          backgroundX: 0,
          backgroundY: 0,
          farPetalX: -driftX * 2,
          farPetalY: -driftY * 1.2,
          nearPetalX: driftX * 3,
          nearPetalY: driftY * 1.8,
          groundX: 0,
          groundY: 0,
          treeSway: Math.sin(time * 0.58) * 0.006 + Math.sin(time * 1.17 + 0.6) * 0.0025
        };
      }

      function drawParallaxImage(sourceCanvas, offsetX, offsetY, overscan = 0) {
        ctx.drawImage(
          sourceCanvas,
          offsetX - overscan,
          offsetY - overscan,
          width + overscan * 2,
          height + overscan * 2
        );
      }

      function drawFogPuff(x, y, radiusX, radiusY, alpha, color) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(radiusX, radiusY);

        const fog = ctx.createRadialGradient(0, 0, 0, 0, 0, 1);
        fog.addColorStop(0, color.replace("ALPHA", alpha.toFixed(3)));
        fog.addColorStop(0.48, color.replace("ALPHA", (alpha * 0.42).toFixed(3)));
        fog.addColorStop(1, color.replace("ALPHA", "0"));

        ctx.fillStyle = fog;
        ctx.beginPath();
        ctx.arc(0, 0, 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawMovingFogLayer(time, options) {
        const cloudAlpha = cloudMultiplier();
        if (cloudAlpha <= 0) {
          return;
        }

        const {
          baseY,
          heightSpan,
          speed,
          depth,
          count,
          seed,
          alpha,
          color,
          puffScale,
          blur
        } = options;
        const rng = mulberry32(seed);
        const safeWidth = Math.max(width, 1);
        const scaledCount = Math.max(2, Math.ceil(count * quality.fogScale));
        const stride = safeWidth / Math.max(1, scaledCount - 1);
        const travel = safeWidth + stride * 2;
        const offset = ((time * speed) % travel + travel) % travel;
        const verticalBreathe = Math.sin(time * (0.06 + depth * 0.05) + seed) * height * 0.006 * depth;

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.filter = blur ? `blur(${blur * quality.fogBlurScale}px)` : "none";
        ctx.globalAlpha = 1;

        for (let i = 0; i < scaledCount + 2; i += 1) {
          const jitter = seededBetween(rng, -stride * 0.36, stride * 0.36);
          const x = ((i * stride + jitter + offset) % travel) - stride;
          const y =
            height * baseY +
            Math.sin(time * (0.13 + depth * 0.04) + i * 1.7 + seed * 0.1) * heightSpan * 0.22 +
            seededBetween(rng, -heightSpan, heightSpan) +
            verticalBreathe;
          const radiusX = seededBetween(rng, width * 0.06, width * 0.16) * puffScale;
          const radiusY = seededBetween(rng, height * 0.018, height * 0.055) * puffScale;
          const puffAlpha = alpha * cloudAlpha * seededBetween(rng, 0.62, 1.05);

          drawFogPuff(x, y, radiusX, radiusY, puffAlpha, color);
        }

        ctx.restore();
      }

      function drawMovingFog(time, stage) {
        if (!quality.fog || cloudMultiplier() <= 0) {
          return;
        }

        if (stage === "sky") {
          drawMovingFogLayer(time, {
            baseY: 0.24,
            heightSpan: height * 0.055,
            speed: -5.5,
            depth: 0.35,
            count: 8,
            seed: 181,
            alpha: 0.105,
            color: "rgba(255,245,252,ALPHA)",
            puffScale: 1.28,
            blur: Math.max(10, width * 0.006)
          });
          drawMovingFogLayer(time, {
            baseY: 0.43,
            heightSpan: height * 0.045,
            speed: 3.8,
            depth: 0.45,
            count: 7,
            seed: 223,
            alpha: 0.075,
            color: "rgba(238,228,248,ALPHA)",
            puffScale: 1.1,
            blur: Math.max(12, width * 0.007)
          });
          return;
        }

        if (stage === "valley") {
          drawMovingFogLayer(time, {
            baseY: 0.69,
            heightSpan: height * 0.035,
            speed: -10,
            depth: 0.72,
            count: 9,
            seed: 307,
            alpha: 0.13,
            color: "rgba(225,218,232,ALPHA)",
            puffScale: 0.88,
            blur: Math.max(8, width * 0.0048)
          });
          return;
        }

        drawMovingFogLayer(time, {
          baseY: 0.83,
          heightSpan: height * 0.026,
          speed: 16,
          depth: 1,
          count: 8,
          seed: 419,
          alpha: 0.06,
          color: "rgba(238,231,236,ALPHA)",
          puffScale: 0.72,
          blur: Math.max(6, width * 0.0035)
        });
      }

      function treeWindAt(time) {
        const canopyX = treeBaseX + width * 0.1;
        const canopyY = groundYAt(treeBaseX) - height * 0.2;
        let gustPush = 0;

        for (let i = 0; i < gusts.length; i += 1) {
          const gust = gusts[i];
          const dx = canopyX - gust.x;
          const dy = canopyY - gust.y;
          const distanceSquared = dx * dx + dy * dy;

          if (distanceSquared < gust.radiusSquared * 1.75) {
            const distance = Math.sqrt(distanceSquared) + 0.001;
            const influence = Math.pow(1 - Math.min(1, distance / (gust.radius * 1.32)), 2);
            gustPush += (gust.driftX * 0.42 - dy / distance * gust.spin * 18) * influence;
          }
        }

        return (
          Math.sin(time * 0.58) * 9 +
          Math.sin(time * 1.17 + 0.6) * 4 +
          windBandAt(0.28) * 0.32 +
          gustPush
        );
      }

      function drawWindSlicedTree(time, motion) {
        if (!quality.treeSlices) {
          ctx.drawImage(treeCanvas, 0, 0, width, height);
          return;
        }

        const pivotX = treeBaseX;
        const pivotY = groundYAt(treeBaseX) + height * 0.012;
        const wind = treeWindAt(time);
        const sliceHeight = Math.max(18, Math.floor(height / quality.treeSliceStep));
        const trunkAnchor = height * 0.68;
        const canopyBottom = Math.max(0, pivotY - height * 0.04);

        ctx.drawImage(treeCanvas, 0, 0, width, height);

        ctx.save();
        ctx.globalAlpha = 0.26;
        ctx.globalCompositeOperation = "source-over";

        for (let y = 0; y < canopyBottom; y += sliceHeight) {
          const h = Math.min(sliceHeight, canopyBottom - y);
          const heightLift = clamp((trunkAnchor - y) / Math.max(height * 0.42, 1), 0, 1);
          const ripple = Math.sin(time * 1.8 + y * 0.026) * 0.55;
          const gust = windBandAt(clamp(y / Math.max(height, 1), 0, 1)) * 0.035;
          const offsetX = (wind * 0.022 + gust + ripple) * heightLift * heightLift;

          if (Math.abs(offsetX) < 0.22) {
            continue;
          }

          ctx.drawImage(
            treeCanvas,
            0,
            y * dpr,
            treeCanvas.width,
            h * dpr,
            offsetX,
            y,
            width,
            h
          );
        }

        ctx.restore();
      }

      function render(time) {
        const motion = sceneMotion(time);

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        drawParallaxImage(backgroundCanvas, motion.backgroundX, motion.backgroundY, 12);
        drawMovingFog(time, "sky");

        ctx.save();
        ctx.translate(motion.farPetalX, motion.farPetalY);
        drawPetalLayer(0, time);
        ctx.restore();

        drawMovingFog(time, "valley");
        drawFarGroundPetals(time);
        drawWindSlicedTree(time, motion);

        ctx.save();
        ctx.translate(motion.nearPetalX, motion.nearPetalY);
        drawPetalLayer(1, time);
        ctx.restore();

        ctx.save();
        ctx.translate(motion.groundX, motion.groundY);
        drawGroundPetals(time);
        ctx.restore();
        drawMovingFog(time, "foreground");
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        dpr = chooseDevicePixelRatio();
        lastTime = 0;
        sceneTime = 0;
        treeBaseX = width < 700 ? width * 0.42 : width * 0.34;
        rebuildGroundCache();
        pointer.targetX = clamp(pointer.targetX, 0, width);
        pointer.targetY = clamp(pointer.targetY, 0, height);
        pointer.x = clamp(pointer.x, 0, width);
        pointer.y = clamp(pointer.y, 0, height);
        pointer.prevX = pointer.x;
        pointer.prevY = pointer.y;
        pointer.vx = 0;
        pointer.vy = 0;
        pointer.liftCarry = 0;

        setupLayer(canvas, ctx);
        setupLayer(farGroundCanvas, farGroundCtx);
        setupLayer(groundCanvas, groundCtx);
        groundCacheReady = false;
        groundCacheDirty = true;
        nextGroundCacheRefresh = 0;
        buildBackground();
        buildTree();
        rebuildParticles();
        warmupScene();
      }

      function requestResize() {
        if (resizeFrame) {
          return;
        }

        resizeFrame = requestAnimationFrame(() => {
          resizeFrame = 0;
          resize();
        });
      }

      function frame(now) {
        const clockTime = now * 0.001;
        if (lastTime && quality.frameInterval && clockTime - lastTime < quality.frameInterval) {
          requestAnimationFrame(frame);
          return;
        }

        const dt = Math.min(0.05, lastTime ? clockTime - lastTime : 0.016);
        lastTime = clockTime;
        sceneTime += dt;

        updatePointer(dt);
        updateGusts(dt, sceneTime);
        scatterGroundPetals(dt);
        updatePetals(dt, sceneTime);
        render(sceneTime);

        requestAnimationFrame(frame);
      }

      canvas.addEventListener("pointermove", (event) => {
        updatePointerTarget(event.clientX, event.clientY);
        pointer.inside = true;
      });

      canvas.addEventListener("pointerdown", (event) => {
        updatePointerTarget(event.clientX, event.clientY);
        pointer.inside = true;
        pointer.down = true;
        pointer.energy = Math.max(pointer.energy, 0.75);
        pointer.press = Math.max(pointer.press, 0.42);
        pointer.liftCarry = Math.max(pointer.liftCarry, 3.2);
        if (canvas.setPointerCapture) {
          canvas.setPointerCapture(event.pointerId);
        }
      });

      canvas.addEventListener("pointerup", (event) => {
        pointer.down = false;
        if (typeof event.clientX === "number" && typeof event.clientY === "number") {
          updatePointerTarget(event.clientX, event.clientY);
          pointer.inside = pointerIsInsideCanvas(event.clientX, event.clientY);
        }
        if (canvas.releasePointerCapture && canvas.hasPointerCapture && canvas.hasPointerCapture(event.pointerId)) {
          canvas.releasePointerCapture(event.pointerId);
        }
      });

      canvas.addEventListener("pointerleave", () => {
        if (!pointer.down) {
          pointer.inside = false;
        }
      });

      canvas.addEventListener("pointercancel", () => {
        pointer.down = false;
        pointer.inside = false;
      });

      window.addEventListener("pointerup", (event) => {
        pointer.down = false;
        if (typeof event.clientX === "number" && typeof event.clientY === "number") {
          updatePointerTarget(event.clientX, event.clientY);
          pointer.inside = pointerIsInsideCanvas(event.clientX, event.clientY);
        } else {
          pointer.inside = false;
        }
      });

      window.addEventListener("resize", requestResize, { passive: true });
      customizerToggle.addEventListener("click", () => {
        const isOpen = customizerPanel.hidden;
        customizerPanel.hidden = !isOpen;
        customizerToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      });
      skyboxControl.addEventListener("change", (event) => {
        setCustomizerValue("skybox", event.target.value);
      });
      skyToneControl.addEventListener("input", (event) => {
        setCustomizerValue("skyTone", Number(event.target.value));
      });
      cloudAmountControl.addEventListener("input", (event) => {
        setCustomizerValue("cloudAmount", Number(event.target.value));
      });
      windSpeedControl.addEventListener("input", (event) => {
        setCustomizerValue("windSpeed", Number(event.target.value));
      });
      resetCustomizer.addEventListener("click", () => {
        customizer = { ...DEFAULT_CUSTOMIZER };
        updateCustomizerControls();
        saveCustomizer();
        if (width && height) {
          requestBackgroundBuild();
        }
      });
      qualityToggle.addEventListener("click", () => {
        setQualityMode(qualityMode === "light" ? "full" : "light");
      });
      sceneToggle.addEventListener("click", () => {
        setSceneMode(sceneMode === "sakura" ? "fall" : "sakura");
      });

      updateSceneToggle();
      updateQualityToggle();
      updateCustomizerControls();
      petalSprites = createPetalSprites();
      resize();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
