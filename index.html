<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dreamy Cherry Blossom Storm</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #d8bfd3;
    }

      canvas {
        position: fixed;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
        transform: translateZ(0);
        will-change: transform;
      }

      .customizer {
        position: fixed;
        left: 16px;
        top: 16px;
        z-index: 2;
      }

      .mode-toggle {
        border: 1px solid rgba(63, 37, 54, 0.24);
        border-radius: 999px;
        padding: 9px 14px;
        color: rgba(45, 28, 40, 0.82);
        background: rgba(255, 248, 252, 0.72);
        box-shadow: 0 10px 30px rgba(65, 40, 62, 0.14);
        font: 600 12px/1.1 ui-sans-serif, system-ui, sans-serif;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        backdrop-filter: blur(10px);
        cursor: pointer;
      }

      .hamburger-toggle {
        width: 44px;
        height: 44px;
        padding: 0;
        font-size: 18px;
        line-height: 1;
      }

      .customizer-panel {
        width: min(280px, calc(100vw - 32px));
        margin-top: 10px;
        border: 1px solid rgba(63, 37, 54, 0.2);
        border-radius: 18px;
        padding: 16px;
        color: rgba(45, 28, 40, 0.86);
        background: rgba(255, 248, 252, 0.8);
        box-shadow: 0 18px 48px rgba(65, 40, 62, 0.18);
        font: 600 12px/1.2 ui-sans-serif, system-ui, sans-serif;
        letter-spacing: 0.03em;
        backdrop-filter: blur(14px);
      }

      .customizer-panel[hidden] {
        display: none;
      }

      .control-row {
        display: grid;
        gap: 7px;
        margin-bottom: 14px;
      }

      .control-label {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        text-transform: uppercase;
      }

      .control-row input[type="range"] {
        width: 100%;
        accent-color: #9b5f61;
      }

      .control-row select {
        width: 100%;
        border: 1px solid rgba(63, 37, 54, 0.2);
        border-radius: 12px;
        padding: 9px 10px;
        color: rgba(45, 28, 40, 0.86);
        background: rgba(255, 255, 255, 0.58);
        font: inherit;
        text-transform: none;
      }

      .reset-button {
        width: 100%;
      }

      .panel-toggle-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 14px;
      }

      .panel-toggle-row .mode-toggle {
        padding-inline: 10px;
      }

      .mode-toggle:focus-visible {
        outline: 2px solid rgba(142, 72, 105, 0.78);
        outline-offset: 3px;
      }

      @media (max-width: 640px) {
        .mode-toggle {
          padding: 8px 12px;
        }

        .customizer {
          left: 10px;
          top: 10px;
        }
      }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="customizer">
    <button class="mode-toggle hamburger-toggle" id="customizerToggle" type="button" aria-expanded="false" aria-controls="customizerPanel">☰</button>
    <div class="customizer-panel" id="customizerPanel" hidden>
      <div class="panel-toggle-row">
        <button class="mode-toggle" id="sceneToggle" type="button"></button>
        <button class="mode-toggle" id="qualityToggle" type="button" aria-pressed="false"></button>
      </div>
      <label class="control-row">
        <span class="control-label"><span>Skybox</span><span id="skyboxValue"></span></span>
        <select id="skyboxControl">
          <option value="scene">Scene default</option>
          <option value="midday">Midday blue</option>
          <option value="sunset">Sunset</option>
          <option value="night">Night</option>
          <option value="overcast">Overcast</option>
        </select>
      </label>
      <label class="control-row">
        <span class="control-label"><span>Sky tone</span><span id="skyToneValue"></span></span>
        <input id="skyToneControl" type="range" min="-50" max="50" step="1">
      </label>
      <label class="control-row">
        <span class="control-label"><span>Clouds</span><span id="cloudAmountValue"></span></span>
        <input id="cloudAmountControl" type="range" min="0" max="100" step="5">
      </label>
      <label class="control-row">
        <span class="control-label"><span>Wind</span><span id="windSpeedValue"></span></span>
        <input id="windSpeedControl" type="range" min="25" max="220" step="5">
      </label>
      <button class="mode-toggle reset-button" id="resetCustomizer" type="button">Reset controls</button>
    </div>
  </div>
  <script>
    (() => {
      const canvas = document.getElementById("scene");
      const customizerToggle = document.getElementById("customizerToggle");
      const customizerPanel = document.getElementById("customizerPanel");
      const skyboxControl = document.getElementById("skyboxControl");
      const skyboxValue = document.getElementById("skyboxValue");
      const skyToneControl = document.getElementById("skyToneControl");
      const skyToneValue = document.getElementById("skyToneValue");
      const cloudAmountControl = document.getElementById("cloudAmountControl");
      const cloudAmountValue = document.getElementById("cloudAmountValue");
      const windSpeedControl = document.getElementById("windSpeedControl");
      const windSpeedValue = document.getElementById("windSpeedValue");
      const resetCustomizer = document.getElementById("resetCustomizer");
      const sceneToggle = document.getElementById("sceneToggle");
      const qualityToggle = document.getElementById("qualityToggle");
      const ctx = canvas.getContext("2d", { alpha: false });
      const backgroundCanvas = document.createElement("canvas");
      const backgroundCtx = backgroundCanvas.getContext("2d");
      const treeCanvas = document.createElement("canvas");
      const treeCtx = treeCanvas.getContext("2d");
      const farGroundCanvas = document.createElement("canvas");
      const farGroundCtx = farGroundCanvas.getContext("2d");
      const groundCanvas = document.createElement("canvas");
      const groundCtx = groundCanvas.getContext("2d");
      const MAX_DEVICE_PIXEL_RATIO = 1.35;
      const MAX_BACKING_PIXELS = 1800000;
      const GROUND_SAMPLE_SPACING = 8;
      const GROUND_CACHE_REFRESH_INTERVAL = 0.16;
      const GROUND_FOREGROUND_DEPTH = 0.24;
      const WIND_BAND_COUNT = 18;
      const WIND_BASE = 24;
      const WIND_SWAY = 42;
      const WIND_RIPPLE = 24;
      const WIND_SHEAR = 24;
      const WIND_TURBULENCE = 24;
      const WIND_VERTICAL_ROLL = 20;
      const QUALITY_STORAGE_KEY = "cherry-blossom-quality";
      const SCENE_STORAGE_KEY = "cherry-blossom-scene";
      const CUSTOMIZER_STORAGE_KEY = "cherry-blossom-customizer";
      const DEFAULT_CUSTOMIZER = {
        skybox: "scene",
        skyTone: 0,
        cloudAmount: 100,
        windSpeed: 100
      };
      const SKYBOXES = {
        scene: {
          label: "Scene"
        },
        midday: {
          label: "Midday",
          sky: ["#a8d9ff", "#8fc7f2", "#d8ecff"],
          wash: ["rgba(255,255,255,0.16)", "rgba(110,174,225,0.08)"],
          mountains: ["rgba(98, 132, 159, 0.22)", "rgba(116, 150, 173, 0.3)", "rgba(128, 164, 181, 0.32)"],
          mist: ["rgba(226,242,255,0.12)", "rgba(198,225,244,0.22)", "rgba(171,206,227,0.4)"],
          sun: true,
          cloudTint: "cool"
        },
        sunset: {
          label: "Sunset",
          sky: ["#f7c891", "#df8c6b", "#8c6a8f"],
          wash: ["rgba(255,185,91,0.24)", "rgba(168,72,80,0.12)"],
          mountains: ["rgba(121, 81, 86, 0.28)", "rgba(148, 92, 88, 0.34)", "rgba(155, 109, 102, 0.36)"],
          mist: ["rgba(238,178,133,0.14)", "rgba(190,119,113,0.25)", "rgba(112,84,106,0.45)"],
          sun: true,
          cloudTint: "warm"
        },
        night: {
          label: "Night",
          sky: ["#18233c", "#263255", "#51456f"],
          wash: ["rgba(90,116,176,0.14)", "rgba(28,20,56,0.16)"],
          mountains: ["rgba(38, 45, 75, 0.48)", "rgba(48, 54, 86, 0.46)", "rgba(58, 62, 92, 0.42)"],
          mist: ["rgba(87,94,129,0.1)", "rgba(63,70,107,0.2)", "rgba(36,42,72,0.52)"],
          sun: false,
          cloudTint: "night"
        },
        overcast: {
          label: "Overcast",
          sky: ["#c9cdd1", "#b9bdc4", "#a7aeb8"],
          wash: ["rgba(230,234,236,0.16)", "rgba(118,126,138,0.08)"],
          mountains: ["rgba(92, 99, 109, 0.28)", "rgba(108, 115, 123, 0.34)", "rgba(122, 129, 135, 0.36)"],
          mist: ["rgba(224,226,226,0.18)", "rgba(187,191,193,0.3)", "rgba(132,139,145,0.5)"],
          sun: false,
          cloudTint: "gray"
        }
      };
      const QUALITY_PROFILES = {
        full: {
          label: "Full",
          maxDpr: 1.35,
          maxBackingPixels: 1800000,
          particleMin: 850,
          particleMax: 1500,
          particleDensity: 1450,
          groundPetalScale: 1,
          groundCacheRefresh: 0.16,
          fog: true,
          fogScale: 1,
          fogBlurScale: 1,
          treeSlices: true,
          treeSliceStep: 34,
          frameInterval: 0,
          warmupDuration: 4.2,
          warmupRate: 20,
          layerGroundChecks: true,
          drawMargin: 96,
          gustLimit: 6
        },
        light: {
          label: "Light",
          maxDpr: 1,
          maxBackingPixels: 900000,
          particleMin: 180,
          particleMax: 380,
          particleDensity: 5200,
          groundPetalScale: 0.28,
          groundCacheRefresh: 0.36,
          fog: false,
          fogScale: 0.45,
          fogBlurScale: 0.55,
          treeSlices: false,
          treeSliceStep: 22,
          frameInterval: 1 / 30,
          warmupDuration: 1.6,
          warmupRate: 14,
          layerGroundChecks: false,
          drawMargin: 72,
          gustLimit: 4
        }
      };
      const SCENES = {
        sakura: {
          label: "Sakura",
          title: "Dreamy Cherry Blossom Storm",
          bodyColor: "#d8bfd3",
          sky: ["#e0c5d7", "#d0bddf", "#c5b9e4"],
          wash: ["rgba(220,191,192,0.22)", "rgba(222,190,211,0.06)"],
          mountains: ["rgba(128, 108, 154, 0.3)", "rgba(145, 126, 171, 0.36)", "rgba(150, 139, 174, 0.36)"],
          mist: ["rgba(219,201,218,0.14)", "rgba(208,190,213,0.28)", "rgba(193,177,201,0.6)"],
          ground: ["rgba(178,203,139,0.96)", "rgba(135,169,111,0.99)", "rgba(82,124,86,1)"],
          petals: [
            {
              sprite: { top: "#fffdf9", mid: "#ffe8ef", bottom: "#f8c9d8", glow: "rgba(255,255,255,0.7)" },
              cluster: { top: "rgba(255,253,249,0.98)", bottom: "rgba(248,201,216,0.95)", highlightTop: "rgba(255,255,250,0.98)", highlightBottom: "rgba(250,216,227,0.95)" }
            },
            {
              sprite: { top: "#fff6fb", mid: "#ffc9dc", bottom: "#ef97b8", glow: "rgba(255,230,241,0.68)" },
              cluster: { top: "rgba(255,246,251,0.98)", bottom: "rgba(239,151,184,0.95)", highlightTop: "rgba(255,255,250,0.98)", highlightBottom: "rgba(250,216,227,0.95)" }
            },
            {
              sprite: { top: "#fff1f7", mid: "#f6aecb", bottom: "#d9749f", glow: "rgba(255,214,232,0.64)" },
              cluster: { top: "rgba(255,241,247,0.97)", bottom: "rgba(217,116,159,0.93)", highlightTop: "rgba(255,255,250,0.98)", highlightBottom: "rgba(250,216,227,0.95)" }
            }
          ]
        },
        fall: {
          label: "Fall",
          title: "Windy Autumn Leaf Storm",
          bodyColor: "#d9b58f",
          sky: ["#e8cfa8", "#d7b58f", "#b98f78"],
          wash: ["rgba(255,176,91,0.18)", "rgba(143,82,50,0.08)"],
          mountains: ["rgba(122, 88, 65, 0.28)", "rgba(142, 94, 62, 0.33)", "rgba(150, 112, 80, 0.34)"],
          mist: ["rgba(219,181,142,0.12)", "rgba(178,132,96,0.22)", "rgba(128,92,70,0.42)"],
          ground: ["rgba(184,164,92,0.98)", "rgba(141,126,70,1)", "rgba(88,91,62,1)"],
          petals: [
            {
              sprite: { top: "#ffe2a6", mid: "#e78132", bottom: "#a84523", glow: "rgba(255,196,112,0.55)" },
              cluster: { top: "rgba(255,216,142,0.96)", bottom: "rgba(185,79,35,0.94)", highlightTop: "rgba(255,230,166,0.98)", highlightBottom: "rgba(214,119,45,0.95)" }
            },
            {
              sprite: { top: "#ffd05e", mid: "#c65f22", bottom: "#7b2d1c", glow: "rgba(255,180,65,0.5)" },
              cluster: { top: "rgba(255,202,94,0.96)", bottom: "rgba(130,48,29,0.94)", highlightTop: "rgba(255,221,132,0.98)", highlightBottom: "rgba(178,83,31,0.95)" }
            },
            {
              sprite: { top: "#f2b04a", mid: "#9d4a2d", bottom: "#5e2e27", glow: "rgba(225,130,58,0.46)" },
              cluster: { top: "rgba(230,151,64,0.95)", bottom: "rgba(95,49,38,0.93)", highlightTop: "rgba(250,188,88,0.98)", highlightBottom: "rgba(142,70,42,0.95)" }
            }
          ]
        }
      };

      let width = 0;
      let height = 0;
      let dpr = 1;
      let lastTime = 0;
      let sceneTime = 0;
      let treeBaseX = 0;
      let branchSegments = [];
      let branchJoints = [];
      let blossomClusters = [];
      let spawnPoints = [];
      let petals = [];
      let groundPetals = [];
      let gusts = [];
      let petalSprites = [];
      let petalLayers = [[], []];
      let groundSamples = [];
      let groundSampleSpacing = GROUND_SAMPLE_SPACING;
      let groundCacheDirty = true;
      let groundCacheReady = false;
      let nextGroundCacheRefresh = 0;
      let windBands = [];
      let nextGustAt = 0;
      let resizeFrame = 0;
      let backgroundBuildFrame = 0;
      const treeGenerationSeed = (Math.random() * 0xffffffff) >>> 0;
      let customizer = loadCustomizer();
      let sceneMode = chooseInitialSceneMode();
      let activeScene = SCENES[sceneMode];
      let qualityMode = chooseInitialQualityMode();
      let quality = QUALITY_PROFILES[qualityMode];
      const pointer = {
        x: 0,
        y: 0,
        targetX: 0,
        targetY: 0,
        prevX: 0,
        prevY: 0,
        vx: 0,
        vy: 0,
        inside: false,
        down: false,
        initialized: false,
        energy: 0,
        press: 0,
        liftCarry: 0
      };
      const pointerField = {
        active: false,
        radius: 0,
        radiusSquared: 0,
        motionFactor: 0,
        hoverStrength: 0,
        pressStrength: 0,
        orbital: 0,
        push: 0,
        lift: 0,
        driftX: 0,
        driftY: 0,
        spinDirection: 1,
        pulseTime: 0
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function mulberry32(seed) {
        let t = seed >>> 0;
        return () => {
          t += 0x6d2b79f5;
          let r = Math.imul(t ^ (t >>> 15), 1 | t);
          r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
          return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
        };
      }

      function seededBetween(rng, min, max) {
        return min + rng() * (max - min);
      }

      function loadCustomizer() {
        const params = new URLSearchParams(window.location.search);
        try {
          const stored = JSON.parse(window.localStorage.getItem(CUSTOMIZER_STORAGE_KEY));
          if (stored && typeof stored === "object") {
            const storedSkybox = SKYBOXES[stored.skybox] ? stored.skybox : DEFAULT_CUSTOMIZER.skybox;
            const loaded = {
              skybox: storedSkybox,
              skyTone: clamp(Number(stored.skyTone) || 0, -50, 50),
              cloudAmount: clamp(Number(stored.cloudAmount) || 0, 0, 100),
              windSpeed: clamp(Number(stored.windSpeed) || DEFAULT_CUSTOMIZER.windSpeed, 25, 220)
            };
            return applyCustomizerQueryOverrides(loaded, params);
          }
        } catch (error) {
          // Storage can be blocked or contain stale data.
        }

        return applyCustomizerQueryOverrides({ ...DEFAULT_CUSTOMIZER }, params);
      }

      function applyCustomizerQueryOverrides(baseCustomizer, params) {
        const requestedSkybox = params.get("skybox");
        const requestedSkyTone = Number(params.get("skyTone"));
        const requestedClouds = Number(params.get("clouds"));
        const requestedWind = Number(params.get("wind"));
        return {
          ...baseCustomizer,
          skybox: SKYBOXES[requestedSkybox] ? requestedSkybox : baseCustomizer.skybox,
          skyTone: Number.isFinite(requestedSkyTone) ? clamp(requestedSkyTone, -50, 50) : baseCustomizer.skyTone,
          cloudAmount: Number.isFinite(requestedClouds) ? clamp(requestedClouds, 0, 100) : baseCustomizer.cloudAmount,
          windSpeed: Number.isFinite(requestedWind) ? clamp(requestedWind, 25, 220) : baseCustomizer.windSpeed
        };
      }

      function saveCustomizer() {
        try {
          window.localStorage.setItem(CUSTOMIZER_STORAGE_KEY, JSON.stringify(customizer));
        } catch (error) {
          // Ignore storage failures; controls still apply for the current session.
        }
      }

      function windMultiplier() {
        return customizer.windSpeed / 100;
      }

      function cloudMultiplier() {
        return customizer.cloudAmount / 100;
      }

      function activeSkybox() {
        return SKYBOXES[customizer.skybox] || SKYBOXES.scene;
      }

      function skyboxValueFor(key) {
        const skybox = activeSkybox();
        return skybox[key] || activeScene[key];
      }

      function updateCustomizerControls() {
        skyboxControl.value = customizer.skybox;
        skyToneControl.value = customizer.skyTone;
        cloudAmountControl.value = customizer.cloudAmount;
        windSpeedControl.value = customizer.windSpeed;
        skyboxValue.textContent = SKYBOXES[customizer.skybox].label;
        skyToneValue.textContent = customizer.skyTone === 0 ? "Neutral" : `${customizer.skyTone > 0 ? "+" : ""}${customizer.skyTone}`;
        cloudAmountValue.textContent = `${customizer.cloudAmount}%`;
        windSpeedValue.textContent = `${customizer.windSpeed}%`;
      }

      function setCustomizerValue(key, value) {
        const next = { ...customizer };
        if (key === "skybox") {
          next.skybox = SKYBOXES[value] ? value : DEFAULT_CUSTOMIZER.skybox;
        } else if (key === "skyTone") {
          next.skyTone = clamp(value, -50, 50);
        } else if (key === "cloudAmount") {
          next.cloudAmount = clamp(value, 0, 100);
        } else if (key === "windSpeed") {
          next.windSpeed = clamp(value, 25, 220);
        }

        customizer = next;
        updateCustomizerControls();
        saveCustomizer();

        if ((key === "skybox" || key === "skyTone" || key === "cloudAmount") && width && height) {
          requestBackgroundBuild();
        }
      }

      function requestBackgroundBuild() {
        if (backgroundBuildFrame) {
          return;
        }

        backgroundBuildFrame = requestAnimationFrame(() => {
          backgroundBuildFrame = 0;
          buildBackground();
        });
      }

      function chooseInitialQualityMode() {
        const requestedMode = new URLSearchParams(window.location.search).get("quality");
        if (requestedMode === "full" || requestedMode === "light") {
          return requestedMode;
        }

        try {
          const storedMode = window.localStorage.getItem(QUALITY_STORAGE_KEY);
          if (storedMode === "full" || storedMode === "light") {
            return storedMode;
          }
        } catch (error) {
          // Storage can be blocked in embedded or private contexts.
        }

        return "light";
      }

      function chooseInitialSceneMode() {
        const requestedMode = new URLSearchParams(window.location.search).get("scene");
        if (SCENES[requestedMode]) {
          return requestedMode;
        }

        try {
          const storedMode = window.localStorage.getItem(SCENE_STORAGE_KEY);
          if (SCENES[storedMode]) {
            return storedMode;
          }
        } catch (error) {
          // Storage can be blocked in embedded or private contexts.
        }

        return "sakura";
      }

      function updateSceneToggle() {
        sceneToggle.textContent = `${activeScene.label} scene`;
        sceneToggle.title = `Switch to ${sceneMode === "sakura" ? "Fall" : "Sakura"} scene`;
        document.title = activeScene.title;
        document.body.style.background = activeScene.bodyColor;
      }

      function setSceneMode(nextMode) {
        if (!SCENES[nextMode] || nextMode === sceneMode) {
          return;
        }

        sceneMode = nextMode;
        activeScene = SCENES[sceneMode];
        updateSceneToggle();

        try {
          window.localStorage.setItem(SCENE_STORAGE_KEY, sceneMode);
        } catch (error) {
          // Ignore storage failures; the current session still switches scenes.
        }

        petalSprites = createPetalSprites();
        if (width && height) {
          buildBackground();
          buildTree();
          seedGroundPetals();
          groundCacheReady = false;
          markGroundCacheDirty();
        }
      }

      function updateQualityToggle() {
        qualityToggle.textContent = `${quality.label} mode`;
        qualityToggle.setAttribute("aria-pressed", qualityMode === "light" ? "true" : "false");
        qualityToggle.title = qualityMode === "light" ?
          "Light mode: fewer particles and simpler effects" :
          "Full mode: richer particles, fog, and tree motion";
      }

      function setQualityMode(nextMode) {
        if (!QUALITY_PROFILES[nextMode] || nextMode === qualityMode) {
          return;
        }

        qualityMode = nextMode;
        quality = QUALITY_PROFILES[qualityMode];
        updateQualityToggle();

        try {
          window.localStorage.setItem(QUALITY_STORAGE_KEY, qualityMode);
        } catch (error) {
          // Ignore storage failures; the current session still switches modes.
        }

        if (width && height) {
          requestResize();
        }
      }

      function setupLayer(targetCanvas, targetCtx) {
        targetCanvas.width = Math.max(1, Math.floor(width * dpr));
        targetCanvas.height = Math.max(1, Math.floor(height * dpr));
        targetCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        targetCtx.imageSmoothingEnabled = true;
      }

      function chooseDevicePixelRatio() {
        const rawDpr = Math.min(window.devicePixelRatio || 1, Math.min(MAX_DEVICE_PIXEL_RATIO, quality.maxDpr));
        const cssPixels = Math.max(1, width * height);
        const pixelCappedDpr = Math.sqrt(Math.min(MAX_BACKING_PIXELS, quality.maxBackingPixels) / cssPixels);
        return Math.max(1, Math.min(rawDpr, pixelCappedDpr));
      }

      function sceneScale(min = 0.88, max = 1.42) {
        const referencePixels = 1440 * 900;
        const scale = Math.sqrt(Math.max(1, width * height) / referencePixels);
        return clamp(scale, min, max);
      }

      function canopyScale() {
        const scale = sceneScale(0.92, 1.3);
        return lerp(1.04, 1.2, clamp((scale - 1) / 0.3, 0, 1));
      }

      function calculateGroundYAt(x) {
        const safeWidth = Math.max(width, 1);
        const t = clamp(x / safeWidth, 0, 1);
        const moundOffset = (x - treeBaseX) / (safeWidth * 0.3);
        const driftOffset = (x - safeWidth * 0.72) / (safeWidth * 0.28);
        const leftOffset = (x - safeWidth * 0.12) / (safeWidth * 0.24);
        const mound = Math.exp(-(moundOffset * moundOffset)) * height * 0.062;
        const drift = Math.exp(-(driftOffset * driftOffset)) * height * 0.024;
        const leftRoll = Math.exp(-(leftOffset * leftOffset)) * height * 0.012;
        const wave =
          Math.sin(t * Math.PI * 1.55 + 0.38) * height * 0.014 +
          Math.sin(t * Math.PI * 3.1 + 2.1) * height * 0.005;
        return height * 0.872 - mound - drift - leftRoll + wave;
      }

      function rebuildGroundCache() {
        groundSampleSpacing = GROUND_SAMPLE_SPACING;
        const sampleCount = Math.max(2, Math.ceil(width / groundSampleSpacing) + 2);
        groundSamples = new Array(sampleCount);

        for (let i = 0; i < sampleCount; i += 1) {
          groundSamples[i] = calculateGroundYAt(Math.min(width, i * groundSampleSpacing));
        }
      }

      function groundYAt(x) {
        if (groundSamples.length < 2) {
          return calculateGroundYAt(x);
        }

        const clampedX = clamp(x, 0, width);
        const index = Math.min(groundSamples.length - 2, Math.floor(clampedX / groundSampleSpacing));
        const t = (clampedX - index * groundSampleSpacing) / groundSampleSpacing;
        return lerp(groundSamples[index], groundSamples[index + 1], t);
      }

      function chooseGroundPetalDepth() {
        return Math.pow(Math.random(), 3.1);
      }

      function groundPetalYAt(x, depth) {
        const safeWidth = Math.max(width, 1);
        const t = clamp(x / safeWidth, 0, 1);
        const foregroundRun = height * (0.105 + Math.sin(t * Math.PI + 0.4) * 0.018);
        const softScatter = Math.sin(t * Math.PI * 2.4 + depth * 3.2) * height * 0.004 * depth;
        return groundYAt(x) + depth * foregroundRun + softScatter;
      }

      function settledGroundPetalY(x, depth) {
        const crestTuck = lerp(3.5, 0, depth);
        const scatter = randomBetween(0.2, 4.8) * lerp(0.18, 1, depth);
        return groundPetalYAt(x, depth) + crestTuck + scatter;
      }

      function setPetalLayer(petal, layer) {
        if (petal.layer === layer) {
          return;
        }

        if (petal.layer === 0 || petal.layer === 1) {
          const previousLayer = petalLayers[petal.layer];
          const previousIndex = previousLayer[petal.layerIndex] === petal ?
            petal.layerIndex :
            previousLayer.indexOf(petal);

          if (previousIndex !== -1) {
            const movedPetal = previousLayer.pop();
            if (previousIndex < previousLayer.length) {
              previousLayer[previousIndex] = movedPetal;
              movedPetal.layerIndex = previousIndex;
            }
          }
        }

        const targetLayer = petalLayers[layer];
        petal.layer = layer;
        petal.layerIndex = targetLayer.length;
        targetLayer.push(petal);
      }

      function prepareWindBands(time) {
        if (windBands.length !== WIND_BAND_COUNT) {
          windBands = new Array(WIND_BAND_COUNT);
        }

        const windScale = windMultiplier();
        for (let i = 0; i < WIND_BAND_COUNT; i += 1) {
          const t = i / (WIND_BAND_COUNT - 1);
          windBands[i] = (
            Math.sin(time * 0.82 + t * Math.PI * 3.4) * WIND_VERTICAL_ROLL +
            Math.sin(time * 1.35 + t * Math.PI * 6.2 + 0.8) * WIND_VERTICAL_ROLL * 0.38
          ) * windScale;
        }
      }

      function windBandAt(heightRatio) {
        const scaledIndex = heightRatio * (WIND_BAND_COUNT - 1);
        const index = Math.min(WIND_BAND_COUNT - 2, Math.max(0, Math.floor(scaledIndex)));
        const t = scaledIndex - index;
        return lerp(windBands[index], windBands[index + 1], t);
      }

      function createPetalSprites() {
        return activeScene.petals.map((paletteSet, index) => {
          const palette = paletteSet.sprite;
          const sprite = document.createElement("canvas");
          sprite.width = 64;
          sprite.height = 64;
          const spriteCtx = sprite.getContext("2d");

          spriteCtx.translate(32, 32);
          spriteCtx.rotate((index - 1) * 0.08);
          spriteCtx.shadowColor = palette.glow;
          spriteCtx.shadowBlur = 10;

          const gradient = spriteCtx.createLinearGradient(0, -18, 0, 18);
          gradient.addColorStop(0, palette.top);
          gradient.addColorStop(0.55, palette.mid);
          gradient.addColorStop(1, palette.bottom);
          spriteCtx.fillStyle = gradient;

          spriteCtx.beginPath();
          spriteCtx.moveTo(0, -16);
          spriteCtx.bezierCurveTo(11, -18, 17, -5, 0, 18);
          spriteCtx.bezierCurveTo(-17, -5, -11, -18, 0, -16);
          spriteCtx.fill();

          spriteCtx.shadowBlur = 0;
          spriteCtx.strokeStyle = "rgba(255,255,255,0.55)";
          spriteCtx.lineWidth = 1.5;
          spriteCtx.beginPath();
          spriteCtx.moveTo(0, -12);
          spriteCtx.quadraticCurveTo(2, 0, 0, 12);
          spriteCtx.stroke();

          return sprite;
        });
      }

      function drawMountainLayer(targetCtx, options) {
        const { baseY, amplitude, color, blur, seed } = options;
        const rng = mulberry32(seed);
        const points = [];
        const segments = 7;

        for (let i = 0; i <= segments; i += 1) {
          const t = i / segments;
          const x = lerp(-width * 0.08, width * 1.08, t);
          const wave = Math.sin(t * Math.PI * 2.2 + seed * 0.1) * amplitude * 0.18;
          const y = baseY - amplitude * seededBetween(rng, 0.18, 1) + wave;
          points.push({ x, y });
        }

        targetCtx.save();
        targetCtx.filter = blur ? `blur(${blur}px)` : "none";
        targetCtx.fillStyle = color;
        targetCtx.beginPath();
        targetCtx.moveTo(-width * 0.1, height);
        targetCtx.lineTo(points[0].x, baseY + amplitude * 0.55);

        for (let i = 1; i < points.length - 1; i += 1) {
          const midpointX = (points[i].x + points[i + 1].x) * 0.5;
          const midpointY = (points[i].y + points[i + 1].y) * 0.5;
          targetCtx.quadraticCurveTo(points[i].x, points[i].y, midpointX, midpointY);
        }

        const last = points[points.length - 1];
        targetCtx.quadraticCurveTo(last.x, last.y, width * 1.1, baseY + amplitude * 0.5);
        targetCtx.lineTo(width * 1.1, height);
        targetCtx.closePath();
        targetCtx.fill();
        targetCtx.restore();
      }

      function drawSunlight(targetCtx) {
        const sunX = width * 0.87;
        const sunY = height * 0.14;

        const halo = targetCtx.createRadialGradient(sunX, sunY, 0, sunX, sunY, width * 0.24);
        halo.addColorStop(0, "rgba(255,239,230,0.58)");
        halo.addColorStop(0.12, "rgba(251,220,201,0.18)");
        halo.addColorStop(0.45, "rgba(245,197,216,0.04)");
        halo.addColorStop(1, "rgba(255,255,255,0)");
        targetCtx.fillStyle = halo;
        targetCtx.beginPath();
        targetCtx.arc(sunX, sunY, width * 0.24, 0, Math.PI * 2);
        targetCtx.fill();

        targetCtx.save();
        targetCtx.translate(sunX, sunY);
        targetCtx.rotate(-0.32);
        const streak = targetCtx.createLinearGradient(-width * 0.34, 0, width * 0.34, 0);
        streak.addColorStop(0, "rgba(255,255,255,0)");
        streak.addColorStop(0.42, "rgba(251,232,223,0.05)");
        streak.addColorStop(0.5, "rgba(252,242,237,0.1)");
        streak.addColorStop(0.58, "rgba(248,225,218,0.05)");
        streak.addColorStop(1, "rgba(255,255,255,0)");
        targetCtx.fillStyle = streak;
        targetCtx.fillRect(-width * 0.34, -2, width * 0.68, 4);
        targetCtx.restore();

        const artifacts = [
          { t: 0.14, r: 18, alpha: 0.16 },
          { t: 0.29, r: 10, alpha: 0.1 },
          { t: 0.51, r: 24, alpha: 0.08 }
        ];

        for (const artifact of artifacts) {
          const x = lerp(sunX, width * 0.4, artifact.t);
          const y = lerp(sunY, height * 0.56, artifact.t);
          const gradient = targetCtx.createRadialGradient(x, y, 0, x, y, artifact.r * 3);
          gradient.addColorStop(0, `rgba(251,236,229,${artifact.alpha * 0.7})`);
          gradient.addColorStop(0.3, `rgba(245,210,223,${artifact.alpha * 0.32})`);
          gradient.addColorStop(1, "rgba(255,255,255,0)");
          targetCtx.fillStyle = gradient;
          targetCtx.beginPath();
          targetCtx.arc(x, y, artifact.r * 3, 0, Math.PI * 2);
          targetCtx.fill();
        }
      }

      function drawCloudVeils(targetCtx) {
        const cloudAlpha = cloudMultiplier();
        if (cloudAlpha <= 0) {
          return;
        }

        const tint = activeSkybox().cloudTint || "scene";
        const layers = [
          { y: 0.18, scale: 0.72, alpha: 0.1, drift: -0.04, seed: 31 },
          { y: 0.34, scale: 0.92, alpha: 0.075, drift: 0.08, seed: 73 },
          { y: 0.52, scale: 0.62, alpha: 0.06, drift: 0.02, seed: 109 }
        ];

        targetCtx.save();
        targetCtx.globalCompositeOperation = "screen";
        targetCtx.filter = `blur(${Math.max(8, width * 0.008)}px)`;

        for (const layer of layers) {
          const rng = mulberry32(layer.seed + Math.floor(width * 0.13) + Math.floor(height * 0.17));
          const bandY = height * layer.y;
          const bandHeight = height * 0.08 * layer.scale;
          const gradient = targetCtx.createLinearGradient(0, bandY - bandHeight, 0, bandY + bandHeight);
          gradient.addColorStop(0, "rgba(255,255,255,0)");
          const cloudColor =
            tint === "night" ? "rgba(173,184,222,ALPHA)" :
            tint === "gray" ? "rgba(238,240,240,ALPHA)" :
            tint === "cool" ? "rgba(245,250,255,ALPHA)" :
            tint === "warm" ? "rgba(255,232,205,ALPHA)" :
            "rgba(255,246,251,ALPHA)";
          gradient.addColorStop(0.5, cloudColor.replace("ALPHA", (layer.alpha * cloudAlpha).toFixed(3)));
          gradient.addColorStop(1, "rgba(255,255,255,0)");

          targetCtx.fillStyle = gradient;
          targetCtx.beginPath();
          targetCtx.moveTo(-width * 0.12, bandY - bandHeight * 0.18);

          for (let x = -width * 0.1; x <= width * 1.12; x += width * 0.13) {
            const lift = seededBetween(rng, -bandHeight, bandHeight);
            const nextX = x + width * 0.14;
            targetCtx.bezierCurveTo(
              x + width * 0.04,
              bandY + lift * 0.7,
              x + width * 0.08,
              bandY - lift * 0.34,
              nextX,
              bandY + seededBetween(rng, -bandHeight * 0.28, bandHeight * 0.28)
            );
          }

          targetCtx.lineTo(width * 1.12, bandY + bandHeight * 0.82);
          targetCtx.bezierCurveTo(width * 0.72, bandY + bandHeight * 1.05, width * 0.3, bandY + bandHeight * 0.62, -width * 0.12, bandY + bandHeight * 0.82);
          targetCtx.closePath();
          targetCtx.fill();

          const streak = targetCtx.createLinearGradient(width * layer.drift, bandY, width * (1 + layer.drift), bandY);
          streak.addColorStop(0, "rgba(255,255,255,0)");
          streak.addColorStop(0.45, cloudColor.replace("ALPHA", (layer.alpha * 0.28 * cloudAlpha).toFixed(3)));
          streak.addColorStop(0.56, cloudColor.replace("ALPHA", (layer.alpha * 0.48 * cloudAlpha).toFixed(3)));
          streak.addColorStop(1, "rgba(255,255,255,0)");
          targetCtx.fillStyle = streak;
          targetCtx.fillRect(0, bandY - bandHeight * 0.45, width, bandHeight * 0.9);
        }

        targetCtx.restore();
      }

      function drawDistantTreeLine(targetCtx) {
        const rng = mulberry32(((width * 1237) ^ (height * 8867) ^ 0x4f1bbcdc) >>> 0);
        const baseY = height * 0.785;
        const gradient = targetCtx.createLinearGradient(0, baseY - height * 0.16, 0, baseY + height * 0.04);
        gradient.addColorStop(0, "rgba(118,132,112,0.05)");
        gradient.addColorStop(0.55, "rgba(91,111,102,0.12)");
        gradient.addColorStop(1, "rgba(83,105,92,0)");

        targetCtx.save();
        targetCtx.fillStyle = gradient;
        targetCtx.beginPath();
        targetCtx.moveTo(-width * 0.06, height);

        let x = -width * 0.05;
        while (x < width * 1.08) {
          const crownWidth = seededBetween(rng, width * 0.035, width * 0.085);
          const crownHeight = seededBetween(rng, height * 0.035, height * 0.092);
          const crownY = baseY - crownHeight * seededBetween(rng, 0.35, 0.85);
          targetCtx.quadraticCurveTo(x + crownWidth * 0.25, crownY, x + crownWidth * 0.5, baseY - crownHeight);
          targetCtx.quadraticCurveTo(x + crownWidth * 0.78, crownY, x + crownWidth, baseY + seededBetween(rng, -5, 8));
          x += crownWidth * seededBetween(rng, 0.62, 1.0);
        }

        targetCtx.lineTo(width * 1.08, height);
        targetCtx.closePath();
        targetCtx.fill();
        targetCtx.restore();
      }

      function drawAtmosphericTexture(targetCtx) {
        const accents = [
          { x: width * 0.2, y: height * 0.16, radius: width * 0.28, color: "rgba(236,214,228,0.06)" },
          { x: width * 0.7, y: height * 0.22, radius: width * 0.34, color: "rgba(209,193,224,0.07)" },
          { x: width * 0.44, y: height * 0.48, radius: width * 0.24, color: "rgba(228,208,225,0.04)" },
          { x: width * 0.82, y: height * 0.58, radius: width * 0.22, color: "rgba(198,182,212,0.05)" }
        ];

        for (const accent of accents) {
          const gradient = targetCtx.createRadialGradient(
            accent.x,
            accent.y,
            0,
            accent.x,
            accent.y,
            accent.radius
          );
          gradient.addColorStop(0, accent.color);
          gradient.addColorStop(0.55, accent.color.replace(/0\.\d+\)$/, "0.03)"));
          gradient.addColorStop(1, "rgba(255,255,255,0)");
          targetCtx.fillStyle = gradient;
          targetCtx.beginPath();
          targetCtx.arc(accent.x, accent.y, accent.radius, 0, Math.PI * 2);
          targetCtx.fill();
        }

        const vignette = targetCtx.createRadialGradient(
          width * 0.5,
          height * 0.42,
          width * 0.12,
          width * 0.5,
          height * 0.42,
          width * 0.82
        );
        vignette.addColorStop(0, "rgba(255,255,255,0)");
        vignette.addColorStop(0.7, "rgba(137,118,155,0.03)");
        vignette.addColorStop(1, "rgba(108,90,125,0.08)");
        targetCtx.fillStyle = vignette;
        targetCtx.fillRect(0, 0, width, height);

        const noiseCanvas = document.createElement("canvas");
        noiseCanvas.width = Math.max(160, Math.floor(width));
        noiseCanvas.height = Math.max(120, Math.floor(height));

        const noiseCtx = noiseCanvas.getContext("2d");
        const noise = noiseCtx.createImageData(noiseCanvas.width, noiseCanvas.height);
        const data = noise.data;
        const rng = mulberry32(((width * 92821) ^ (height * 68917) ^ 0x85ebca6b) >>> 0);

        // A tiny textured wash helps hide visible gradient banding on weaker panels.
        for (let i = 0; i < data.length; i += 4) {
          const base = 118 + Math.floor(rng() * 26);
          const tint = rng() - 0.5;
          data[i] = base + tint * 12 + 8;
          data[i + 1] = base + tint * 4 + 2;
          data[i + 2] = base - tint * 10 + 10;
          data[i + 3] = 16 + Math.floor(rng() * 18);
        }

        noiseCtx.putImageData(noise, 0, 0);

        targetCtx.save();
        targetCtx.globalCompositeOperation = "soft-light";
        targetCtx.globalAlpha = 0.18;
        targetCtx.drawImage(noiseCanvas, 0, 0, width, height);
        targetCtx.restore();

        targetCtx.save();
        targetCtx.globalAlpha = 0.035;
        targetCtx.drawImage(noiseCanvas, 0, 0, width, height);
        targetCtx.restore();
      }

      function traceGroundPath(targetCtx, lift = 0) {
        targetCtx.beginPath();
        targetCtx.moveTo(0, height);
        targetCtx.lineTo(0, groundYAt(0) - lift);
        for (let x = 24; x <= width + 24; x += 24) {
          targetCtx.lineTo(x, groundYAt(x) - lift);
        }
        targetCtx.lineTo(width, height);
        targetCtx.closePath();
      }

      function drawGrassTexture(targetCtx) {
        const rng = mulberry32(((width * 39409) ^ (height * 78233) ^ 0xa5b35705) >>> 0);

        targetCtx.save();
        traceGroundPath(targetCtx, 10);
        targetCtx.clip();

        const hillShade = targetCtx.createRadialGradient(
          treeBaseX + width * 0.1,
          groundYAt(treeBaseX) + height * 0.05,
          0,
          treeBaseX + width * 0.08,
          groundYAt(treeBaseX) + height * 0.08,
          width * 0.48
        );
        hillShade.addColorStop(0, "rgba(236,231,206,0.28)");
        hillShade.addColorStop(0.46, "rgba(157,184,127,0.12)");
        hillShade.addColorStop(1, "rgba(78,112,83,0)");
        targetCtx.fillStyle = hillShade;
        targetCtx.fillRect(0, height * 0.62, width, height * 0.38);

        const crestBladeCount = Math.min(520, Math.max(180, Math.floor(width * 0.32)));
        targetCtx.lineCap = "round";
        for (let i = 0; i < crestBladeCount; i += 1) {
          const x = rng() * width;
          const baseY = groundYAt(x) + seededBetween(rng, -1, 5);
          const bladeHeight = seededBetween(rng, 3, 8);
          const lean = seededBetween(rng, -2.5, 4.5);
          targetCtx.strokeStyle = rng() < 0.5 ? "rgba(150,181,114,0.28)" : "rgba(88,130,84,0.22)";
          targetCtx.lineWidth = seededBetween(rng, 0.45, 0.9);
          targetCtx.beginPath();
          targetCtx.moveTo(x, baseY + seededBetween(rng, 0, 2));
          targetCtx.quadraticCurveTo(x + lean * 0.42, baseY - bladeHeight * 0.5, x + lean, baseY - bladeHeight);
          targetCtx.stroke();
        }

        const bladeCount = Math.min(1400, Math.max(320, Math.floor(width * 0.72)));
        for (let i = 0; i < bladeCount; i += 1) {
          const x = rng() * width;
          const depth = Math.pow(rng(), 0.58);
          const baseY = groundPetalYAt(x, depth) + seededBetween(rng, -2, 7);
          const bladeHeight = seededBetween(rng, 3, 10) * lerp(0.72, 1.35, depth);
          const lean = seededBetween(rng, -2.8, 4.6) + Math.sin(x * 0.012 + depth * 4.6) * 1.6;
          const alpha = seededBetween(rng, 0.08, 0.22) * lerp(0.72, 1, depth);

          targetCtx.strokeStyle = rng() < 0.55 ?
            `rgba(104,145,90,${alpha})` :
            `rgba(68,108,78,${alpha * 0.88})`;
          targetCtx.lineWidth = seededBetween(rng, 0.45, 1.1);
          targetCtx.beginPath();
          targetCtx.moveTo(x, baseY);
          targetCtx.quadraticCurveTo(
            x + lean * 0.55,
            baseY - bladeHeight * 0.55,
            x + lean,
            baseY - bladeHeight
          );
          targetCtx.stroke();
        }

        targetCtx.restore();
      }

      function buildBackground() {
        setupLayer(backgroundCanvas, backgroundCtx);
        const skyColors = skyboxValueFor("sky");
        const washColors = skyboxValueFor("wash");
        const mountainColors = skyboxValueFor("mountains");
        const mistColors = skyboxValueFor("mist");
        const skybox = activeSkybox();

        const sky = backgroundCtx.createLinearGradient(0, 0, 0, height);
        sky.addColorStop(0, skyColors[0]);
        sky.addColorStop(0.48, skyColors[1]);
        sky.addColorStop(1, skyColors[2]);
        backgroundCtx.fillStyle = sky;
        backgroundCtx.fillRect(0, 0, width, height);

        if (customizer.skyTone !== 0) {
          const toneStrength = Math.abs(customizer.skyTone) / 50;
          const tone = backgroundCtx.createLinearGradient(0, 0, width, height);
          if (customizer.skyTone > 0) {
            tone.addColorStop(0, `rgba(255,205,128,${0.2 * toneStrength})`);
            tone.addColorStop(0.55, `rgba(236,122,84,${0.1 * toneStrength})`);
            tone.addColorStop(1, `rgba(137,80,56,${0.08 * toneStrength})`);
          } else {
            tone.addColorStop(0, `rgba(167,213,255,${0.22 * toneStrength})`);
            tone.addColorStop(0.55, `rgba(114,158,220,${0.12 * toneStrength})`);
            tone.addColorStop(1, `rgba(75,98,158,${0.08 * toneStrength})`);
          }
          backgroundCtx.fillStyle = tone;
          backgroundCtx.fillRect(0, 0, width, height);
        }

        const wash = backgroundCtx.createLinearGradient(width, 0, 0, height);
        wash.addColorStop(0, washColors[0]);
        wash.addColorStop(0.45, washColors[1]);
        wash.addColorStop(1, "rgba(255,255,255,0)");
        backgroundCtx.fillStyle = wash;
        backgroundCtx.fillRect(0, 0, width, height);

        drawCloudVeils(backgroundCtx);
        if (skybox.sun !== false) {
          drawSunlight(backgroundCtx);
        }

        drawMountainLayer(backgroundCtx, {
          baseY: height * 0.66,
          amplitude: height * 0.12,
          color: mountainColors[0],
          blur: 18,
          seed: 11
        });
        drawMountainLayer(backgroundCtx, {
          baseY: height * 0.72,
          amplitude: height * 0.09,
          color: mountainColors[1],
          blur: 10,
          seed: 27
        });
        drawMountainLayer(backgroundCtx, {
          baseY: height * 0.77,
          amplitude: height * 0.06,
          color: mountainColors[2],
          blur: 4,
          seed: 43
        });
        drawDistantTreeLine(backgroundCtx);

        const mist = backgroundCtx.createLinearGradient(0, height * 0.46, 0, height);
        mist.addColorStop(0, "rgba(255,255,255,0)");
        mist.addColorStop(0.35, mistColors[0]);
        mist.addColorStop(0.7, mistColors[1]);
        mist.addColorStop(1, mistColors[2]);
        backgroundCtx.fillStyle = mist;
        backgroundCtx.fillRect(0, height * 0.46, width, height * 0.54);

        for (let i = 0; i < 3; i += 1) {
          const fogX = lerp(width * 0.2, width * 0.85, i / 2);
          const fogY = height * (0.7 + i * 0.04);
          const fog = backgroundCtx.createRadialGradient(fogX, fogY, 0, fogX, fogY, width * 0.22);
          fog.addColorStop(0, "rgba(234,223,232,0.13)");
          fog.addColorStop(0.5, "rgba(223,210,223,0.07)");
          fog.addColorStop(1, "rgba(255,255,255,0)");
          backgroundCtx.fillStyle = fog;
          backgroundCtx.beginPath();
          backgroundCtx.arc(fogX, fogY, width * 0.22, 0, Math.PI * 2);
          backgroundCtx.fill();
        }

        drawAtmosphericTexture(backgroundCtx);

        const groundGradient = backgroundCtx.createLinearGradient(0, height * 0.78, 0, height);
        groundGradient.addColorStop(0, activeScene.ground[0]);
        groundGradient.addColorStop(0.46, activeScene.ground[1]);
        groundGradient.addColorStop(1, activeScene.ground[2]);
        backgroundCtx.fillStyle = groundGradient;
        traceGroundPath(backgroundCtx);
        backgroundCtx.fill();
        drawGrassTexture(backgroundCtx);
      }

      function addBlossomCluster(x, y, thickness, rng, depth, tip = false) {
        const densityScale = canopyScale();
        const radius = Math.max(11, (thickness * seededBetween(rng, 2.05, 3.32) + depth * 1.38) * densityScale);
        const count = Math.floor((seededBetween(rng, tip ? 17 : 14, tip ? 31 : 26) + depth * 1.86) * densityScale);

        blossomClusters.push({
          x,
          y,
          depth,
          radius,
          count: Math.max(5, count),
          alpha: seededBetween(rng, 0.64, 0.96),
          seed: Math.floor(seededBetween(rng, 0, 1) * 1e9)
        });
      }

      function addBranchJoint(x, y, parentWidth, childWidth, childCount) {
        if (parentWidth < 1.8 || childWidth < 0.8) {
          return;
        }

        branchJoints.push({
          x,
          y,
          radius: Math.min(parentWidth * 0.58, Math.max(parentWidth, childWidth * (1.4 + childCount * 0.18))),
          alpha: clamp(0.48 + childCount * 0.08, 0.52, 0.78)
        });
      }

      function traceBranch(x, y, length, angle, depth, thickness, rng) {
        const bend = seededBetween(rng, -0.28, 0.28) * (depth < 2 ? 0.45 : 0.85);
        const controlX = x + Math.cos(angle + bend) * length * 0.46;
        const controlY = y + Math.sin(angle + bend) * length * 0.46;
        const x2 = x + Math.cos(angle) * length;
        const y2 = y + Math.sin(angle) * length;

        branchSegments.push({
          x,
          y,
          controlX,
          controlY,
          x2,
          y2,
          width: thickness,
          depth
        });

        const lowEdge = depth >= 5 && y2 > height * 0.72 && Math.abs(x2 - treeBaseX) > width * 0.22;

        if (depth >= 2 && !lowEdge && seededBetween(rng, 0, 1) < 0.98) {
          addBlossomCluster(x2, y2, thickness * 1.2, rng, depth, false);
        }

        if (depth >= 2 && !lowEdge && seededBetween(rng, 0, 1) < 0.94) {
          const t = seededBetween(rng, 0.22, 0.8);
          addBlossomCluster(
            lerp(x, x2, t) + seededBetween(rng, -9, 9),
            lerp(y, y2, t) + seededBetween(rng, -13, 6),
            thickness * 1.08,
            rng,
            depth,
            false
          );
        }

        if (depth >= 4 && !lowEdge && seededBetween(rng, 0, 1) < 0.68) {
          const t = seededBetween(rng, 0.36, 0.88);
          addBlossomCluster(
            lerp(x, x2, t) + seededBetween(rng, -12, 12),
            lerp(y, y2, t) + seededBetween(rng, -11, 8),
            thickness * 0.82,
            rng,
            depth + 0.5,
            false
          );
        }

        if (depth >= 7 || length < 22 || thickness < 1.45) {
          const tipClusters = lowEdge ? 2 : 3;
          for (let i = 0; i < tipClusters; i += 1) {
            addBlossomCluster(
              x2 + seededBetween(rng, -12, 12),
              y2 + seededBetween(rng, lowEdge ? -18 : -12, lowEdge ? -2 : 8),
              thickness * (lowEdge ? 0.72 : 1.02),
              rng,
              depth + 1,
              true
            );
          }
          spawnPoints.push({
            x: x2,
            y: y2,
            spread: 16 + length * 0.2
          });
          return;
        }

        const childCount =
          depth === 0 ? 5 :
          depth < 2 ? (seededBetween(rng, 0, 1) < 0.68 ? 3 : 2) :
          seededBetween(rng, 0, 1) < 0.22 ? 3 : 2;
        const spread = depth === 0 ? 0.4 : depth < 2 ? 0.54 : 0.58;

        const childSpecs = [];

        for (let i = 0; i < childCount; i += 1) {
          const offset = i - (childCount - 1) * 0.5;
          const angleOffset =
            offset * spread +
            seededBetween(rng, -0.16, 0.16) +
            (offset === 0 ? seededBetween(rng, -0.12, 0.12) : 0);
          const upwardBias = depth >= 2 && offset !== 0 ? -0.07 : 0;
          const nextAngle = angle + angleOffset + upwardBias - depth * 0.006 + seededBetween(rng, -0.04, 0.04);
          const nextLength = length * seededBetween(rng, depth < 2 ? 0.72 : 0.6, depth < 2 ? 0.84 : 0.74);
          const nextThickness = thickness * seededBetween(rng, depth < 2 ? 0.68 : 0.62, depth < 2 ? 0.8 : 0.76);
          childSpecs.push({ x: x2, y: y2, length: nextLength, angle: nextAngle, thickness: nextThickness });
        }

        addBranchJoint(x2, y2, thickness, Math.max(...childSpecs.map((child) => child.thickness)), childSpecs.length);

        for (const child of childSpecs) {
          traceBranch(child.x, child.y, child.length, child.angle, depth + 1, child.thickness, rng);
        }

        if (depth < 4 && seededBetween(rng, 0, 1) < 0.72) {
          const t = seededBetween(rng, 0.42, 0.68);
          const sideX = lerp(x, x2, t);
          const sideY = lerp(y, y2, t);
          const sideThickness = thickness * seededBetween(rng, 0.5, 0.66);
          addBranchJoint(sideX, sideY, thickness * 0.82, sideThickness, 1);
          traceBranch(
            sideX,
            sideY,
            length * seededBetween(rng, 0.5, 0.66),
            angle + seededBetween(rng, -0.58, 0.58) - 0.1,
            depth + 1,
            sideThickness,
            rng
          );
        }
      }

      function drawBlossomCluster(targetCtx, cluster) {
        const rng = mulberry32(cluster.seed);

        targetCtx.save();
        targetCtx.translate(cluster.x, cluster.y);
        targetCtx.globalAlpha = cluster.alpha;

        const halo = targetCtx.createRadialGradient(0, 0, 0, 0, 0, cluster.radius * 1.18);
        halo.addColorStop(0, "rgba(255,245,250,0.08)");
        halo.addColorStop(0.5, "rgba(255,228,239,0.018)");
        halo.addColorStop(1, "rgba(255,255,255,0)");
        targetCtx.fillStyle = halo;
        targetCtx.beginPath();
        targetCtx.arc(0, 0, cluster.radius * 1.18, 0, Math.PI * 2);
        targetCtx.fill();

        for (let i = 0; i < cluster.count; i += 1) {
          const angle = seededBetween(rng, 0, Math.PI * 2);
          const distance = Math.pow(seededBetween(rng, 0, 1), 0.58) * cluster.radius;
          const px = Math.cos(angle) * distance;
          const py = Math.sin(angle) * distance * 0.78;
          const size = seededBetween(rng, 3.1, 6.9);
          const rotation = seededBetween(rng, -Math.PI, Math.PI);
          const shade = activeScene.petals[(rng() * activeScene.petals.length) | 0].cluster;
          const highlight = rng() < 0.22;

          targetCtx.save();
          targetCtx.translate(px, py);
          targetCtx.rotate(rotation);

          const petalGradient = targetCtx.createLinearGradient(0, -size, 0, size);
          petalGradient.addColorStop(0, highlight ? shade.highlightTop : shade.top);
          petalGradient.addColorStop(1, highlight ? shade.highlightBottom : shade.bottom);
          targetCtx.fillStyle = petalGradient;

          targetCtx.beginPath();
          targetCtx.moveTo(0, -size * 0.9);
          targetCtx.bezierCurveTo(size * 0.62, -size * 0.7, size * 0.95, size * 0.15, 0, size * 1.15);
          targetCtx.bezierCurveTo(-size * 0.95, size * 0.15, -size * 0.62, -size * 0.7, 0, -size * 0.9);
          targetCtx.fill();

          targetCtx.restore();
        }

        targetCtx.restore();
      }

      function createBranchPath(targetCtx, segment, startRadius, endRadius, controlRadius) {
        const dx = segment.x2 - segment.x;
        const dy = segment.y2 - segment.y;
        const length = Math.hypot(dx, dy) || 1;
        const nx = -dy / length;
        const ny = dx / length;

        targetCtx.beginPath();
        targetCtx.moveTo(segment.x + nx * startRadius, segment.y + ny * startRadius);
        targetCtx.quadraticCurveTo(
          segment.controlX + nx * controlRadius,
          segment.controlY + ny * controlRadius,
          segment.x2 + nx * endRadius,
          segment.y2 + ny * endRadius
        );
        targetCtx.lineTo(segment.x2 - nx * endRadius, segment.y2 - ny * endRadius);
        targetCtx.quadraticCurveTo(
          segment.controlX - nx * controlRadius,
          segment.controlY - ny * controlRadius,
          segment.x - nx * startRadius,
          segment.y - ny * startRadius
        );
        targetCtx.closePath();
      }

      function drawBranchSilhouette(targetCtx, segment) {
        const startRadius = segment.width * 0.78;
        const endRadius = Math.max(0.72, segment.width * 0.4);
        const controlRadius = Math.max(0.5, (startRadius + endRadius) * 0.54);

        targetCtx.fillStyle = "rgba(28,16,22,0.88)";
        targetCtx.shadowColor = "rgba(24,10,18,0.18)";
        targetCtx.shadowBlur = Math.max(1, segment.width * 0.38);
        createBranchPath(targetCtx, segment, startRadius, endRadius, controlRadius);
        targetCtx.fill();
      }

      function drawBranchCore(targetCtx, segment) {
        const dx = segment.x2 - segment.x;
        const dy = segment.y2 - segment.y;
        const length = Math.hypot(dx, dy) || 1;
        const nx = -dy / length;
        const ny = dx / length;
        const startRadius = segment.width * 0.6;
        const endRadius = Math.max(0.54, segment.width * 0.29);
        const controlRadius = Math.max(0.38, (startRadius + endRadius) * 0.5);

        const barkGradient = targetCtx.createLinearGradient(
          segment.x - nx * startRadius,
          segment.y - ny * startRadius,
          segment.x + nx * startRadius,
          segment.y + ny * startRadius
        );
        barkGradient.addColorStop(0, "rgba(35,22,28,0.96)");
        barkGradient.addColorStop(0.5, "rgba(69,48,55,0.96)");
        barkGradient.addColorStop(0.82, "rgba(112,82,90,0.82)");
        barkGradient.addColorStop(1, "rgba(45,28,35,0.9)");

        targetCtx.shadowBlur = 0;
        targetCtx.fillStyle = barkGradient;
        createBranchPath(targetCtx, segment, startRadius, endRadius, controlRadius);
        targetCtx.fill();

        if (segment.width > 3.2) {
          targetCtx.strokeStyle = "rgba(184,139,146,0.16)";
          targetCtx.lineWidth = Math.max(0.45, segment.width * 0.07);
          targetCtx.beginPath();
          targetCtx.moveTo(segment.x + nx * startRadius * 0.24, segment.y + ny * startRadius * 0.24);
          targetCtx.quadraticCurveTo(
            segment.controlX + nx * controlRadius * 0.2,
            segment.controlY + ny * controlRadius * 0.2,
            segment.x2 + nx * endRadius * 0.1,
            segment.y2 + ny * endRadius * 0.1
          );
          targetCtx.stroke();
        }
      }

      function drawBranchJoint(targetCtx, joint) {
        const radius = joint.radius;
        const jointGradient = targetCtx.createRadialGradient(
          joint.x - radius * 0.18,
          joint.y - radius * 0.22,
          0,
          joint.x,
          joint.y,
          radius * 1.45
        );
        jointGradient.addColorStop(0, `rgba(104,74,82,${joint.alpha})`);
        jointGradient.addColorStop(0.62, `rgba(62,42,49,${joint.alpha * 0.95})`);
        jointGradient.addColorStop(1, "rgba(36,22,28,0)");

        targetCtx.shadowBlur = 0;
        targetCtx.fillStyle = jointGradient;
        targetCtx.beginPath();
        targetCtx.ellipse(joint.x, joint.y, radius * 1.05, radius * 0.86, -0.18, 0, Math.PI * 2);
        targetCtx.fill();
      }

      function drawTrunkBase(targetCtx, x, y, radius) {
        targetCtx.save();

        const baseGradient = targetCtx.createRadialGradient(x - radius * 0.22, y - radius * 0.52, 0, x, y - radius * 0.12, radius * 1.7);
        baseGradient.addColorStop(0, "rgba(95,66,75,0.95)");
        baseGradient.addColorStop(0.55, "rgba(51,33,40,0.98)");
        baseGradient.addColorStop(1, "rgba(28,16,22,0.68)");

        targetCtx.shadowBlur = 0;
        targetCtx.fillStyle = baseGradient;
        targetCtx.beginPath();
        targetCtx.moveTo(x - radius * 0.55, y - radius * 1.2);
        targetCtx.bezierCurveTo(x - radius * 1.05, y - radius * 0.72, x - radius * 1.18, y - radius * 0.08, x - radius * 1.62, y + radius * 0.18);
        targetCtx.bezierCurveTo(x - radius * 0.78, y + radius * 0.02, x - radius * 0.22, y + radius * 0.08, x, y + radius * 0.1);
        targetCtx.bezierCurveTo(x + radius * 0.52, y + radius * 0.08, x + radius * 1.06, y + radius * 0.02, x + radius * 1.68, y + radius * 0.2);
        targetCtx.bezierCurveTo(x + radius * 1.16, y - radius * 0.12, x + radius * 0.98, y - radius * 0.74, x + radius * 0.48, y - radius * 1.22);
        targetCtx.bezierCurveTo(x + radius * 0.22, y - radius * 0.88, x - radius * 0.2, y - radius * 0.88, x - radius * 0.55, y - radius * 1.2);
        targetCtx.closePath();
        targetCtx.fill();

        targetCtx.strokeStyle = "rgba(40,24,30,0.56)";
        targetCtx.lineWidth = Math.max(1, radius * 0.11);
        targetCtx.beginPath();
        targetCtx.moveTo(x - radius * 0.22, y - radius * 0.76);
        targetCtx.quadraticCurveTo(x - radius * 0.8, y - radius * 0.32, x - radius * 1.48, y + radius * 0.13);
        targetCtx.moveTo(x + radius * 0.18, y - radius * 0.78);
        targetCtx.quadraticCurveTo(x + radius * 0.8, y - radius * 0.34, x + radius * 1.5, y + radius * 0.14);
        targetCtx.stroke();

        targetCtx.fillStyle = "rgba(69,92,66,0.24)";
        targetCtx.beginPath();
        targetCtx.ellipse(x, y + radius * 0.38, radius * 1.5, radius * 0.18, -0.04, 0, Math.PI * 2);
        targetCtx.fill();
        targetCtx.restore();
      }

      function buildTree() {
        setupLayer(treeCanvas, treeCtx);
        branchSegments = [];
        branchJoints = [];
        blossomClusters = [];
        spawnPoints = [];

        const seed = ((width * 73856093) ^ (height * 19349663) ^ treeGenerationSeed ^ 0x9e3779b9) >>> 0;
        const rng = mulberry32(seed);
        const baseY = groundYAt(treeBaseX) + height * 0.012;
        const trunkLength = height * (width < 700 ? 0.15 : 0.17);

        traceBranch(treeBaseX, baseY, trunkLength, -1.46, 0, width < 700 ? 20 : 26, rng);

        const baseShadow = treeCtx.createRadialGradient(
          treeBaseX + width * 0.05,
          baseY + height * 0.03,
          0,
          treeBaseX + width * 0.05,
          baseY + height * 0.03,
          width * 0.24
        );
        baseShadow.addColorStop(0, "rgba(72,44,58,0.16)");
        baseShadow.addColorStop(0.55, "rgba(93,66,84,0.08)");
        baseShadow.addColorStop(1, "rgba(255,255,255,0)");
        treeCtx.fillStyle = baseShadow;
        treeCtx.beginPath();
        treeCtx.ellipse(treeBaseX + width * 0.05, baseY + height * 0.03, width * 0.24, height * 0.07, -0.08, 0, Math.PI * 2);
        treeCtx.fill();

        branchSegments.sort((a, b) => b.width - a.width);
        branchJoints.sort((a, b) => b.radius - a.radius);
        treeCtx.lineCap = "round";
        treeCtx.lineJoin = "round";

        for (const segment of branchSegments) {
          drawBranchSilhouette(treeCtx, segment);
        }

        treeCtx.shadowBlur = 0;

        for (const joint of branchJoints) {
          drawBranchJoint(treeCtx, joint);
        }

        for (const segment of branchSegments) {
          drawBranchCore(treeCtx, segment);
        }

        for (const joint of branchJoints) {
          drawBranchJoint(treeCtx, joint);
        }

        drawTrunkBase(treeCtx, treeBaseX, baseY, width < 700 ? 13 : 17);

        for (const cluster of blossomClusters) {
          drawBlossomCluster(treeCtx, cluster);
        }
      }

      function groundPetalLimit() {
        return Math.floor(Math.max(160, Math.min(720, Math.floor(width * 0.45))) * quality.groundPetalScale);
      }

      function markGroundCacheDirty() {
        groundCacheDirty = true;
      }

      function createGroundPetal(x, y, sourcePetal, depth = 0) {
        const petalScale = sceneScale(0.88, 1.28);
        const depthFade = 1 - depth * 0.76;
        return {
          x,
          y,
          depth,
          angle: sourcePetal ? sourcePetal.angle + randomBetween(-0.25, 0.25) : randomBetween(-Math.PI, Math.PI),
          size: (sourcePetal ? sourcePetal.size : randomBetween(0.08, 0.16) * petalScale) * randomBetween(0.9, 1.25) * lerp(1, 0.78, depth),
          aspect: sourcePetal ? sourcePetal.aspect * randomBetween(0.8, 1.08) : randomBetween(0.85, 1.15),
          sprite: sourcePetal ? sourcePetal.sprite : (Math.random() * petalSprites.length) | 0,
          alpha: (sourcePetal ? randomBetween(0.28, 0.78) : randomBetween(0.18, 0.62)) * depthFade,
          phase: randomBetween(0, Math.PI * 2)
        };
      }

      function seedGroundPetals() {
        groundPetals = [];
        const count = Math.floor(Math.max(120, Math.min(520, Math.floor(width * 0.32))) * quality.groundPetalScale);

        for (let i = 0; i < count; i += 1) {
          let x = treeBaseX + (Math.random() - 0.15) * width * randomBetween(0.2, 0.38);
          if (Math.random() < 0.26) {
            x = Math.random() * width;
          }
          x = clamp(x, 0, width);
          const depth = chooseGroundPetalDepth();
          const y = settledGroundPetalY(x, depth);
          groundPetals.push(createGroundPetal(x, y, null, depth));
        }

        markGroundCacheDirty();
      }

      function storeGroundPetal(sourcePetal) {
        const x = clamp(sourcePetal.x + sourcePetal.vx * 0.12, 0, width);
        const sourceDepth = sourcePetal.groundDepth ?? chooseGroundPetalDepth();
        const depth = clamp(sourceDepth + randomBetween(-0.035, 0.055), 0, 1);
        const y = settledGroundPetalY(x, depth);
        const petal = createGroundPetal(x, y, sourcePetal, depth);

        if (groundPetals.length < groundPetalLimit()) {
          groundPetals.push(petal);
        } else {
          groundPetals[(Math.random() * groundPetals.length) | 0] = petal;
        }

        markGroundCacheDirty();
      }

      function resetPetal(petal, initial) {
        const point = spawnPoints[(Math.random() * spawnPoints.length) | 0] || {
          x: width * 0.38,
          y: height * 0.24,
          spread: 48
        };
        const petalScale = sceneScale(0.9, 1.36);

        petal.x = point.x + randomBetween(-point.spread, point.spread);
        petal.y = point.y + randomBetween(-point.spread * 0.55, point.spread * 0.2);
        if (initial) {
          petal.x += randomBetween(-point.spread * 1.35, point.spread * 1.8);
          petal.y += randomBetween(-height * 0.03, height * 0.015);
        }

        petal.vx = randomBetween(-10, 16);
        petal.vy = randomBetween(16, 36);
        petal.gravity = randomBetween(16, 42);
        petal.terminal = randomBetween(38, 104);
        petal.swayAmp = randomBetween(7, 32);
        petal.swaySpeed = randomBetween(0.45, 1.9);
        petal.curveAmp = randomBetween(5, 26);
        petal.floatAmp = randomBetween(1, 9);
        petal.floatSpeed = randomBetween(0.6, 1.8);
        petal.angle = randomBetween(0, Math.PI * 2);
        petal.spin = randomBetween(-2.4, 2.4);
        petal.size = randomBetween(0.1, 0.19) * petalScale;
        petal.aspect = randomBetween(0.82, 1.25);
        petal.alpha = randomBetween(0.55, 0.92);
        petal.phase = randomBetween(0, Math.PI * 2);
        petal.sprite = (Math.random() * petalSprites.length) | 0;
        petal.groundDepth = chooseGroundPetalDepth();
        setPetalLayer(petal, petal.groundDepth >= GROUND_FOREGROUND_DEPTH || Math.random() < 0.34 ? 1 : 0);
        petal.driftBias = randomBetween(-12, 18);
        petal.windResponse = randomBetween(0.62, 1.42);
        petal.turbulenceAmp = randomBetween(3, WIND_TURBULENCE);
        petal.turbulenceSpeed = randomBetween(0.7, 2.8);
        petal.turbulencePhase = randomBetween(0, Math.PI * 2);
        petal.verticalDrift = randomBetween(-4, 8);
        petal.flutter = randomBetween(2.4, 7.2);
      }

      function rebuildParticles() {
        const targetCount = Math.min(
          quality.particleMax,
          Math.max(quality.particleMin, Math.floor((width * height) / quality.particleDensity))
        );
        petals = new Array(targetCount);
        petalLayers = [[], []];

        for (let i = 0; i < targetCount; i += 1) {
          const petal = {};
          resetPetal(petal, true);
          petals[i] = petal;
        }

        seedGroundPetals();
        gusts = [];
        scheduleNextGust(sceneTime);
      }

      function warmupScene(duration = quality.warmupDuration) {
        const step = 1 / quality.warmupRate;
        const steps = Math.ceil(duration / step);

        for (let i = 0; i < steps; i += 1) {
          updateGusts(step, sceneTime);
          updatePetals(step, sceneTime);
          sceneTime += step;
        }
      }

      function scheduleNextGust(time) {
        const clusterDelay =
          Math.random() < 0.58 ?
            randomBetween(0.42, 0.95) :
            randomBetween(1.05, 2.05);
        nextGustAt = time + clusterDelay;
      }

      function updatePointerTarget(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const x = clamp(clientX - rect.left, 0, width);
        const y = clamp(clientY - rect.top, 0, height);

        pointer.targetX = x;
        pointer.targetY = y;

        if (!pointer.initialized) {
          pointer.x = x;
          pointer.y = y;
          pointer.prevX = x;
          pointer.prevY = y;
          pointer.initialized = true;
        }
      }

      function pointerIsInsideCanvas(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return (
          clientX >= rect.left &&
          clientX <= rect.right &&
          clientY >= rect.top &&
          clientY <= rect.bottom
        );
      }

      function updatePointer(dt) {
        if (!pointer.initialized) {
          return;
        }

        const moveLerp = Math.min(1, dt * 16);
        pointer.x = lerp(pointer.x, pointer.targetX, moveLerp);
        pointer.y = lerp(pointer.y, pointer.targetY, moveLerp);

        const invDt = 1 / Math.max(dt, 0.0001);
        const instantVx = (pointer.x - pointer.prevX) * invDt;
        const instantVy = (pointer.y - pointer.prevY) * invDt;
        const velocityLerp = Math.min(1, dt * 10);

        pointer.vx += (instantVx - pointer.vx) * velocityLerp;
        pointer.vy += (instantVy - pointer.vy) * velocityLerp;
        pointer.prevX = pointer.x;
        pointer.prevY = pointer.y;

        const energyTarget = pointer.inside ? 1 : 0;
        const pressTarget = pointer.down ? 1 : 0;
        pointer.energy += (energyTarget - pointer.energy) * Math.min(1, dt * (pointer.inside ? 12 : 5));
        pointer.press += (pressTarget - pointer.press) * Math.min(1, dt * (pointer.down ? 24 : 8));

        if (!pointer.inside && pointer.energy < 0.02) {
          pointer.vx *= Math.max(0, 1 - dt * 6);
          pointer.vy *= Math.max(0, 1 - dt * 6);
        }
      }

      function preparePointerField(time) {
        const fieldStrength = pointer.energy * 1.8 + pointer.press * 1.25;
        if (!pointer.initialized || fieldStrength < 0.01) {
          pointerField.active = false;
          return;
        }

        const minDimension = Math.min(width, height);
        const pressStrength = pointer.press;
        const motionSpeed = Math.hypot(pointer.vx, pointer.vy);
        const motionFactor = clamp(motionSpeed / 320, 0, 1);
        const hoverStrength = pointer.energy * (1 - pressStrength * 0.18);
        const radius = lerp(minDimension * 0.32, minDimension * 0.42, pressStrength) * (1 + motionFactor * 0.28);

        pointerField.active = true;
        pointerField.radius = radius;
        pointerField.radiusSquared = radius * radius;
        pointerField.motionFactor = motionFactor;
        pointerField.hoverStrength = hoverStrength;
        pointerField.pressStrength = pressStrength;
        pointerField.orbital = hoverStrength * 180 + pressStrength * 122 + motionFactor * 74;
        pointerField.push = hoverStrength * 118 + pressStrength * 92 + motionFactor * 56;
        pointerField.lift = hoverStrength * 46 + pressStrength * 58 + motionFactor * 28;
        pointerField.driftX = pointer.vx * (0.11 + hoverStrength * 0.052 + pressStrength * 0.04 + motionFactor * 0.036);
        pointerField.driftY = pointer.vy * (0.072 + hoverStrength * 0.032 + pressStrength * 0.028 + motionFactor * 0.02);
        pointerField.spinDirection = pointer.vx < -16 ? -1 : 1;
        pointerField.pulseTime = time * 2.65;
      }

      function applyPointerForce(petal, dt) {
        if (!pointerField.active) {
          return 0;
        }

        const dx = petal.x - pointer.x;
        const dy = petal.y - pointer.y;
        const distanceSquared = dx * dx + dy * dy;

        if (distanceSquared >= pointerField.radiusSquared) {
          return 0;
        }

        const distance = Math.sqrt(distanceSquared) + 0.001;
        const nx = dx / distance;
        const ny = dy / distance;
        const tx = -ny * pointerField.spinDirection;
        const ty = nx * pointerField.spinDirection;
        const distanceRatio = 1 - distance / pointerField.radius;
        const falloff = Math.pow(distanceRatio, 1.35);
        const pulse = 1 + Math.sin(pointerField.pulseTime + petal.phase) * 0.18;

        petal.vx += (
          tx * pointerField.orbital +
          nx * pointerField.push +
          pointerField.driftX * (0.45 + pointerField.motionFactor * 0.55)
        ) * falloff * pulse * dt;
        petal.vy += (
          ty * pointerField.orbital +
          ny * pointerField.push +
          pointerField.driftY * (0.35 + pointerField.motionFactor * 0.5) -
          pointerField.lift
        ) * falloff * pulse * dt;
        petal.angle += (pointerField.hoverStrength * 2.8 + pointerField.pressStrength * 1.9) * falloff * dt;

        return falloff * (0.86 + pointerField.hoverStrength * 0.34 + pointerField.pressStrength * 0.58);
      }

      function launchGroundPetal(groundPetal) {
        if (!petals.length) {
          return;
        }

        const petal = petals[(Math.random() * petals.length) | 0];
        const dx = groundPetal.x - pointer.x;
        const dy = groundPetal.y - pointer.y;
        const distance = Math.sqrt(dx * dx + dy * dy) + 0.001;
        const nx = dx / distance;
        const ny = dy / distance;
        const spinDirection = pointer.vx < -16 ? -1 : 1;
        const tx = -ny * spinDirection;
        const ty = nx * spinDirection;
        const motionFactor = clamp(Math.hypot(pointer.vx, pointer.vy) / 320, 0, 1);

        petal.x = groundPetal.x + randomBetween(-4, 4);
        petal.y = groundPetal.y - randomBetween(2, 8);
        petal.vx =
          nx * randomBetween(18, 42) +
          tx * randomBetween(12, 28) +
          pointer.vx * (0.08 + motionFactor * 0.09);
        petal.vy =
          ny * randomBetween(6, 16) +
          ty * randomBetween(4, 10) -
          randomBetween(30, 62) +
          pointer.vy * (0.045 + motionFactor * 0.035) -
          pointer.press * 18;
        petal.angle = groundPetal.angle + randomBetween(-0.8, 0.8);
        petal.spin = randomBetween(-2.2, 2.2);
        petal.size = groundPetal.size * randomBetween(0.95, 1.08);
        petal.aspect = groundPetal.aspect * randomBetween(0.95, 1.05);
        petal.alpha = clamp(groundPetal.alpha + randomBetween(0.08, 0.24), 0.56, 0.95);
        petal.phase = randomBetween(0, Math.PI * 2);
        petal.sprite = groundPetal.sprite;
        petal.groundDepth = groundPetal.depth;
        setPetalLayer(petal, 1);
        petal.gravity = randomBetween(16, 42);
        petal.terminal = randomBetween(38, 104);
        petal.swayAmp = randomBetween(7, 32);
        petal.swaySpeed = randomBetween(0.45, 1.9);
        petal.curveAmp = randomBetween(5, 26);
        petal.floatAmp = randomBetween(1, 9);
        petal.floatSpeed = randomBetween(0.6, 1.8);
        petal.driftBias = randomBetween(-12, 18);
        petal.windResponse = randomBetween(0.62, 1.42);
        petal.turbulenceAmp = randomBetween(3, WIND_TURBULENCE);
        petal.turbulenceSpeed = randomBetween(0.7, 2.8);
        petal.turbulencePhase = randomBetween(0, Math.PI * 2);
        petal.verticalDrift = randomBetween(-4, 8);
        petal.flutter = randomBetween(2.4, 7.2);
      }

      function scatterGroundPetals(dt) {
        if (!pointer.initialized || pointer.press < 0.08 || pointer.energy < 0.05 || !groundPetals.length) {
          pointer.liftCarry = 0;
          return;
        }

        const motionFactor = clamp(Math.hypot(pointer.vx, pointer.vy) / 320, 0, 1);
        const radius = lerp(Math.min(width, height) * 0.075, Math.min(width, height) * 0.21, pointer.press) * (1 + motionFactor * 0.16);
        const radiusSquared = radius * radius;
        pointer.liftCarry = Math.min(pointer.liftCarry + dt * lerp(28, 86, pointer.press) * (1 + motionFactor * 0.7), 10);

        let launches = Math.floor(pointer.liftCarry);
        if (!launches) {
          return;
        }

        pointer.liftCarry -= launches;

        for (let i = groundPetals.length - 1; i >= 0 && launches > 0; i -= 1) {
          const groundPetal = groundPetals[i];
          const dx = groundPetal.x - pointer.x;
          const dy = groundPetal.y - pointer.y;

          if (dx * dx + dy * dy < radiusSquared && Math.random() < 0.62) {
            launchGroundPetal(groundPetal);
            groundPetals.splice(i, 1);
            markGroundCacheDirty();
            launches -= 1;
          }
        }
      }

      function spawnGust() {
        const radius = randomBetween(120, 300);
        const entersFromEdge = Math.random() < 0.58;
        const windScale = windMultiplier();

        gusts.push({
          x: entersFromEdge ? -radius * randomBetween(0.2, 0.85) : randomBetween(width * 0.2, width * 0.84),
          y: randomBetween(height * 0.14, height * 0.62),
          radius,
          radiusSquared: radius * radius,
          invRadius: 1 / radius,
          strength: randomBetween(170, 320) * windScale,
          spin: Math.random() < 0.5 ? -1 : 1,
          age: 0,
          duration: randomBetween(4.2, 8.2),
          driftX: randomBetween(18, 48) * windScale,
          driftY: randomBetween(-9, 12) * windScale,
          upLift: randomBetween(38, 90) * windScale
        });

        if (gusts.length > quality.gustLimit) {
          gusts.shift();
        }
      }

      function updateGusts(dt, time) {
        if (time > nextGustAt) {
          spawnGust();
          if (Math.random() < 0.56) {
            spawnGust();
          }
          if (Math.random() < 0.18) {
            spawnGust();
          }
          scheduleNextGust(time);
        }

        for (let i = gusts.length - 1; i >= 0; i -= 1) {
          const gust = gusts[i];
          gust.age += dt;
          gust.x += gust.driftX * dt * 8;
          gust.y += gust.driftY * dt * 8;

          if (
            gust.age > gust.duration ||
            gust.x < -gust.radius ||
            gust.x > width + gust.radius ||
            gust.y > height + gust.radius
          ) {
            gusts.splice(i, 1);
          }
        }
      }

      function updatePetals(dt, time) {
        const windScale = windMultiplier();
        const globalWind = (
          Math.sin(time * 0.15) * WIND_SWAY +
          Math.sin(time * 0.37 + 1.1) * WIND_RIPPLE +
          Math.max(0, Math.sin(time * 0.53 - 0.8)) * WIND_RIPPLE +
          WIND_BASE
        ) * windScale;
        const curveTime = time * 0.55;
        const petalCount = petals.length;
        const gustCount = gusts.length;
        const safeHeight = Math.max(height, 1);
        const invHeight = 1 / safeHeight;
        const groundCheckY = height * 0.66;

        preparePointerField(time);
        prepareWindBands(time);

        for (let i = 0; i < petalCount; i += 1) {
          const petal = petals[i];
          const ambient =
            globalWind +
            Math.sin(time * petal.swaySpeed + petal.phase) * petal.swayAmp +
            Math.sin(curveTime + petal.phase * 0.7) * petal.curveAmp * 0.35;
          let heightRatio = petal.y * invHeight;
          if (heightRatio < 0) {
            heightRatio = 0;
          } else if (heightRatio > 1) {
            heightRatio = 1;
          }
          const windShear = (1 - heightRatio) * WIND_SHEAR * windScale;
          const rollingWind = windBandAt(heightRatio);
          const turbulence = Math.sin(time * petal.turbulenceSpeed + petal.turbulencePhase + petal.y * 0.018) *
            petal.turbulenceAmp;

          const targetVx = (ambient + windShear + rollingWind + petal.driftBias) * petal.windResponse + turbulence;
          petal.vx += (targetVx - petal.vx) * 0.52 * dt;
          petal.vy = Math.min(petal.terminal, petal.vy + (petal.gravity + petal.verticalDrift) * dt);

          let gustInfluence = 0;
          for (let j = 0; j < gustCount; j += 1) {
            const gust = gusts[j];
            const dx = petal.x - gust.x;
            const dy = petal.y - gust.y;
            const distanceSquared = dx * dx + dy * dy;

            if (distanceSquared < gust.radiusSquared) {
              const distance = Math.sqrt(distanceSquared) + 0.001;
              const influenceBase = 1 - distance * gust.invRadius;
              const influence = influenceBase * influenceBase;
              const coreLift = influenceBase * influence;
              const swirl = gust.spin * gust.strength * (0.35 + influence * 1.15);
